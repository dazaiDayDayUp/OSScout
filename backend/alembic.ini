# Alembic 迁移工具配置文件

[alembic]
# 迁移脚本存放路径
script_location = alembic

# 数据库连接地址（会被 env.py 中的配置覆盖）
sqlalchemy.url = postgresql+asyncpg://osscout:osscout@localhost:5432/osscout

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
